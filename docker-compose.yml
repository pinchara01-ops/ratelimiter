version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: rateforge-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rateforge-network

  postgres:
    image: postgres:16-alpine
    container_name: rateforge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rateforge}
      POSTGRES_USER: ${POSTGRES_USER:-rateforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rateforge}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rateforge -d rateforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rateforge-network

  rateforge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rateforge-server
    ports:
      - "9090:9090"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-rateforge}
      - DB_USER=${POSTGRES_USER:-rateforge}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-rateforge}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GRPC_PORT=9090
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - rateforge-network
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

networks:
  rateforge-network:
    driver: bridge
