syntax = "proto3";
package com.rateforge.config.grpc.proto;
option java_multiple_files = true;

enum Algorithm {
  FIXED_WINDOW   = 0;
  SLIDING_WINDOW = 1;
  TOKEN_BUCKET   = 2;
}

message PolicyProto {
  string id                  = 1;
  int64  limit               = 2;
  int64  window_seconds      = 3;
  Algorithm algorithm        = 4;
  int32  priority            = 5;
  string client_key_pattern  = 6;  // empty = match all
  string endpoint_pattern    = 7;  // empty = match all
  int64  created_at_ms       = 8;
  int64  updated_at_ms       = 9;
}

message CreatePolicyRequest  { PolicyProto policy = 1; }
message CreatePolicyResponse { PolicyProto policy = 1; }

message UpdatePolicyRequest  { PolicyProto policy = 1; }
message UpdatePolicyResponse { PolicyProto policy = 1; }

message DeletePolicyRequest  { string id = 1; }
message DeletePolicyResponse { bool deleted = 1; }

message ListPoliciesRequest  {}
message ListPoliciesResponse { repeated PolicyProto policies = 1; }

message GetPolicyRequest     { string id = 1; }
message GetPolicyResponse    { PolicyProto policy = 1; }

service ConfigService {
  rpc CreatePolicy (CreatePolicyRequest)  returns (CreatePolicyResponse);
  rpc UpdatePolicy (UpdatePolicyRequest)  returns (UpdatePolicyResponse);
  rpc DeletePolicy (DeletePolicyRequest)  returns (DeletePolicyResponse);
  rpc ListPolicies (ListPoliciesRequest)  returns (ListPoliciesResponse);
  rpc GetPolicy    (GetPolicyRequest)     returns (GetPolicyResponse);
}
