syntax = "proto3";
package rateforge.analytics;
option java_package = "com.rateforge.analytics.grpc.proto";
option java_multiple_files = true;

enum TimeRange {
  ONE_HOUR    = 0; SIX_HOURS  = 1;
  ONE_DAY     = 2; SEVEN_DAYS = 3; THIRTY_DAYS = 4;
}

message UsageStatsRequest { string policy_id = 1; string client_id = 2; TimeRange time_range = 3; }
message UsageStats {
  string policy_id = 1; int64 total_requests = 2; int64 total_allows = 3;
  int64 total_denies = 4; double deny_rate = 5; double avg_latency_ms = 6; TimeRange time_range = 7;
}

message StreamRequest {
  string policy_id = 1; string client_id = 2;
  bool allowed_only = 3; bool filter_by_allowed = 4;
}
message DecisionEvent {
  string id = 1; int64 occurred_at_ms = 2; string client_id = 3;
  string endpoint = 4; string method = 5; string policy_id = 6;
  bool allowed = 7; string reason = 8; double latency_ms = 9;
}

message TopClientsRequest { TimeRange time_range = 1; int32 limit = 2; }
message ClientStats {
  string client_id = 1; int64 total_requests = 2; int64 total_allows = 3;
  int64 total_denies = 4; double deny_ratio = 5;
}
message TopClientsList { repeated ClientStats clients = 1; TimeRange time_range = 2; }

service AnalyticsService {
  rpc GetUsageStats   (UsageStatsRequest) returns (UsageStats);
  rpc StreamDecisions (StreamRequest)     returns (stream DecisionEvent);
  rpc GetTopClients   (TopClientsRequest) returns (TopClientsList);
}
