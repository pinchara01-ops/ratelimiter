# Render.com Blueprint for RateForge
# Deploy: https://render.com/deploy?repo=https://github.com/pinchara01-ops/ratelimiter

databases:
  - name: rateforge-db
    plan: free
    databaseName: rateforge
    user: rateforge

services:
  # Main Rate Limiter Server (gRPC + REST)
  - type: web
    name: rateforge-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: GRPC_PORT
        value: "9090"
      - key: DB_HOST
        fromDatabase:
          name: rateforge-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: rateforge-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: rateforge-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: rateforge-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: rateforge-db
          property: password
      - key: REDIS_HOST
        fromService:
          name: rateforge-redis
          type: pserv
          property: host
      - key: REDIS_PORT
        value: "6379"

  # Redis (using Render private service - ephemeral, no disk on free tier)
  - type: pserv
    name: rateforge-redis
    runtime: docker
    plan: free
    dockerCommand: redis-server

  # Analytics Service
  - type: web
    name: rateforge-analytics
    runtime: docker
    dockerfilePath: ./Dockerfile.analytics
    plan: free
    envVars:
      - key: GRPC_PORT
        value: "50052"
      - key: DATABASE_URL
        fromDatabase:
          name: rateforge-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: rateforge-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: rateforge-db
          property: password
