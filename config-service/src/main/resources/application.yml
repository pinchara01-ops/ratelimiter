spring:
  application:
    name: rateforge-config
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rateforge}
    username: ${DB_USER:rateforge}
    password: ${DB_PASSWORD:rateforge}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

grpc:
  server:
    port: ${GRPC_CONFIG_PORT:50053}

logging:
  level:
    com.rateforge: INFO
