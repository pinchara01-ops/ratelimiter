spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rateforge}
    username: ${DB_USER:rateforge}
    password: ${DB_PASSWORD:rateforge}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

grpc:
  server:
    port: ${GRPC_PORT:9090}

management:
  server:
    port: 9091
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

rateforge:
  default-no-match-behavior: FAIL_OPEN
  policy-cache-refresh-interval-ms: 30000
  circuit-breaker:
    failure-threshold: 5
    window-ms: 10000
    probe-interval-ms: 30000
    success-threshold: 2
  analytics:
    queue-capacity: 10000
    flush-interval-ms: 500
    flush-batch-size: 1000
    retention-days: 90
  auth:
    enabled: ${AUTH_ENABLED:false}
    api-keys: ${AUTH_API_KEYS:}
    api-key-header: x-api-key
  metrics-auth:
    user: ${METRICS_USER:metrics}
    password: ${METRICS_PASSWORD:metrics}
  timeouts:
    redis-command-ms: ${REDIS_TIMEOUT_MS:100}
    redis-connect-ms: ${REDIS_CONNECT_TIMEOUT_MS:1000}
    database-query-ms: ${DB_QUERY_TIMEOUT_MS:5000}
    grpc-request-ms: ${GRPC_REQUEST_TIMEOUT_MS:10000}
  policy-cache:
    refresh-interval-ms: 30000
    circuit-breaker:
      failure-threshold: 3
      window-ms: 60000
      probe-interval-ms: 30000
      success-threshold: 2

logging:
  level:
    com.rateforge: INFO
    com.rateforge.logging: DEBUG
    io.grpc: WARN
    org.springframework.data.redis: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] %-5level %logger{36} - %msg%n"
