spring:
  application:
    name: rateforge-rate-limiter
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:#{null}}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

grpc:
  server:
    port: ${GRPC_PORT:50051}

logging:
  level:
    com.rateforge: INFO
