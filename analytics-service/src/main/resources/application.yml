spring:
  application:
    name: rateforge-analytics
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/rateforge}
    username: ${DATABASE_USER:rateforge}
    password: ${DATABASE_PASSWORD:rateforge}
    driver-class-name: org.postgresql.Driver
  flyway:
    # server/ owns all migrations (single source of truth for schema).
    # analytics-service is a read-only consumer of the same DB.
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

grpc:
  server:
    port: ${GRPC_PORT:50052}

logging:
  level:
    com.rateforge: INFO
