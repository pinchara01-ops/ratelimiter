spring:
  application:
    name: rateforge-analytics
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/rateforge}
    username: ${DATABASE_USER:rateforge}
    password: ${DATABASE_PASSWORD:rateforge}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 1000
          order_inserts: true

grpc:
  server:
    port: ${GRPC_PORT:50052}

logging:
  level:
    com.rateforge: INFO
